    if(en===an)return true;
    if(en.length>4&&an.length>4&&(en.includes(an)||an.includes(en)))return true;
    const aP=an.split(" "),aFirst=aP[0],aLast=aP[aP.length-1];
    if(eLast===aLast&&eLast.length>2&&eFirst===aFirst&&eFirst.length>1)return true;
    if(aP.length===1&&eLast===aLast&&aLast.length>3)return true;
  }
  return false;
}

let playerStats={},liveGames=[],eliminatedSchools=new Set(),expandedOwner=null,sortCol="score",sortDir="desc";

// ─── FETCH ─────────────────────────────────────────────────────────────────────
async function fetchAllData(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true;btn.textContent="Loading...";
  const stats={},live=[],elim=new Set();

  const SB="https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";
  const tournamentEventIds=new Set();
  const seenEvents=new Set();

  // Step 1: Scan each tournament date (hardcoded to avoid timezone issues)
  const dates=["20260317","20260318","20260319","20260320","20260321","20260322","20260323","20260324","20260325","20260326","20260327","20260328","20260329","20260330","20260331","20260401","20260402","20260403","20260404","20260405","20260406","20260407"];

  for(let i=0;i<dates.length;i++){
    const dt=dates[i];
    const isPlayIn=dt==='20260317'||dt==='20260318';
    btn.textContent=`Scanning ${dt} (${i+1}/${dates.length})...`;
    try{
      const r=await fetch(`${SB}?dates=${dt}&seasontype=3`);
      if(!r.ok)continue;
      const d=await r.json();
      for(const ev of d?.events||[]){
        const co=ev.competitions?.[0];if(!co)continue;
        const st=co.status?.type?.name;
        if(st==="STATUS_FINAL"){
          for(const c of co.competitors||[])if(c.winner===false){
            const n2=ns(c.team?.displayName||c.team?.name||"");if(n2)elim.add(n2);
          }
        }
        if(st==="STATUS_IN_PROGRESS"&&!seenEvents.has(ev.id+'_live')){
          seenEvents.add(ev.id+'_live');
          live.push({teams:co.competitors?.map(c=>({name:c.team?.displayName||c.team?.name,score:c.score?.displayValue||c.score})),clock:co.status?.displayClock,period:co.status?.period,name:ev.shortName||ev.name});
        }
        if(!isPlayIn && (st==="STATUS_FINAL"||st==="STATUS_IN_PROGRESS")){
          tournamentEventIds.add(ev.id);
        }
      }
    }catch(e){}
  }

  // Step 2: Fetch box scores
  const eventList=[...tournamentEventIds];
  let boxCount=0;
  for(const eid of eventList){
    boxCount++;
    btn.textContent=`Box scores ${boxCount}/${eventList.length}...`;
    try{
      const sr=await fetch(`${ESPN_SM}?event=${eid}`);
      if(!sr.ok)continue;
      const sd=await sr.json();
      if(!sd?.boxscore?.players)continue;
      for(const tb of sd.boxscore.players){
        const tn=ns(tb?.team?.displayName||tb?.team?.name||"");
        for(const sg of tb?.statistics||[]){
          const lb=sg?.labels||[];const pi2=lb.indexOf("PTS"),ai=lb.indexOf("AST"),ri=lb.indexOf("REB");
          for(const ath of sg?.athletes||[]){
            const en=ath?.athlete?.displayName||"";const as2=ath?.stats||[];
            const pts=pi2>=0?parseInt(as2[pi2])||0:0,ast=ai>=0?parseInt(as2[ai])||0:0,reb=ri>=0?parseInt(as2[ri])||0:0;
            for(const ow of OWNERS)for(const pl of ow.players){
              if(ns(pl.s)!==tn)continue;if(!pm(en,pl))continue;
              const k=`${ow.name}|${pl.n}`;
              if(!stats[k])stats[k]={pts:0,ast:0,reb:0,gm:0,gids:new Set()};
              if(!stats[k].gids.has(eid)){stats[k].gids.add(eid);stats[k].pts+=pts;stats[k].ast+=ast;stats[k].reb+=reb;stats[k].gm++;}
            }
          }
        }
      }
    }catch(e){}
  }

  playerStats=stats;liveGames=live;eliminatedSchools=elim;
  document.getElementById("syncDot").style.opacity="1";
  document.getElementById("syncText").textContent=`Synced ${new Date().toLocaleTimeString()} · ${eventList.length} games found`;
  btn.disabled=false;btn.textContent="↻ REFRESH";
  render();
}

// ─── COMPUTE ───────────────────────────────────────────────────────────────────
function compute(){
  const owners=OWNERS.map(o=>{
    let tP=0,tA=0,tR=0;
    const pd=o.players.map(p=>{
      const s=playerStats[`${o.name}|${p.n}`]||{pts:0,ast:0,reb:0,gm:0};
      const el=eliminatedSchools.has(ns(p.s));
      tP+=s.pts;tA+=s.ast;tR+=s.reb;
      return{...p,...s,score:s.pts,eliminated:el};
    });
    const activeCount=pd.filter(p=>!p.eliminated).length;
    return{name:o.name,totalPts:tP,totalAst:tA,totalReb:tR,totalScore:tP,players:pd,active:activeCount};
  }).sort((a,b)=>b.totalScore-a.totalScore);

  const all=[];
  for(const o of OWNERS)for(const p of o.players){
    const s=playerStats[`${o.name}|${p.n}`]||{pts:0,ast:0,reb:0,gm:0};
    all.push({name:p.n,school:p.s,owner:o.name,round:p.r,...s,score:s.pts,eliminated:eliminatedSchools.has(ns(p.s))});
  }
  const top=[...all].sort((a,b)=>b.score-a.score).slice(0,20);

  const rds={};for(let r=1;r<=10;r++)rds[r]={total:0,count:0,best:null,bestScore:0};
  for(const p of all){rds[p.round].total+=p.score;rds[p.round].count++;if(p.score>rds[p.round].bestScore){rds[p.round].bestScore=p.score;rds[p.round].best=`${p.name} (${p.owner})`;}}
  const dv=Object.entries(rds).map(([r,d])=>({round:+r,avg:d.count>0?(d.total/d.count).toFixed(1):"0.0",total:d.total,best:d.best||"—",bestScore:d.bestScore}));

  const ts=owners.reduce((s,o)=>s+o.totalScore,0);
  const scored=all.filter(p=>p.score>0).length;
  const elimC=all.filter(p=>p.eliminated).length;

  return{owners,all,top,dv,ts,scored,elimC,leader:owners[0],topPlayer:top[0]};
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
const medalE=i=>i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`;
const medalCls=i=>i===0?"medal-1":i===1?"medal-2":i===2?"medal-3":"";

function render(){
  const D=compute();

  // Live indicator
  const li=document.getElementById("liveIndicator");
  if(liveGames.length>0){li.style.display="flex";document.getElementById("liveCount").textContent=liveGames.length;}else li.style.display="none";

  // Summary cards
  const cards=[
    {label:"TOTAL SCORE",value:D.ts.toLocaleString(),sub:"across 110 players",icon:"📊",grad:"var(--accentDim)"},
    {label:"LEADING OWNER",value:D.leader?.name||"—",sub:D.leader?`${D.leader.totalScore} total`:"",icon:"👑",grad:"var(--goldDim)",hl:true},
    {label:"TOP SCORER",value:D.topPlayer?.name||"—",sub:D.topPlayer?`${D.topPlayer.score} pts · ${D.topPlayer.owner}`:"",icon:"🔥",grad:"var(--accentDim)"},
    {label:"PLAYERS ACTIVE",value:`${D.scored}/${D.all.length}`,sub:`${D.elimC} eliminated`,icon:"📋",grad:"var(--greenDim)"},
    {label:"LIVE GAMES",value:liveGames.length,sub:liveGames.length>0?"in progress":"no live games",icon:liveGames.length>0?"🔴":"⏸️",grad:liveGames.length>0?"var(--redGlow)":"var(--cyanDim)"},
  ];
  document.getElementById("summaryCards").innerHTML=cards.map((c,i)=>`
    <div class="card" style="background:linear-gradient(135deg,${c.grad},var(--card));animation-delay:${i*0.08}s;${c.hl?'border-color:rgba(251,191,36,0.25)':''}">
      <div class="card-corner" style="background:linear-gradient(135deg,transparent 50%,${c.hl?'rgba(251,191,36,0.06)':'rgba(249,115,22,0.04)'} 50%)"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="card-label">${c.label}</span><span style="font-size:18px">${c.icon}</span>
      </div>
      <div class="card-value" style="color:${c.hl?'var(--gold)':'var(--text)'}">${c.value}</div>
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join("");

  // Live games
  document.getElementById("liveGamesSection").innerHTML=liveGames.length>0?`
    <div class="mb32"><div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Live Games</h2></div></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">${liveGames.map(g=>`
      <div class="live-card"><div style="font-family:'Outfit',sans-serif;font-weight:600;margin-bottom:6px;font-size:12px">${g.name}</div>
      ${g.teams?.map(t=>`<div style="display:flex;justify-content:space-between;gap:20px;font-size:13px;margin-bottom:2px"><span class="color-sec">${t.name}</span><span class="fw7 outfit">${t.score}</span></div>`).join("")}
      <div class="color-red" style="font-size:10px;margin-top:4px;font-weight:600">H${g.period} · ${g.clock}</div></div>
    `).join("")}</div></div>`:"";

  // ─── CHART ───────────────────────────────────────────────────────────────────
  const maxS=Math.max(...D.owners.map(o=>o.totalScore),1);
  const bH=30,gap=6,lW=84,cW=480,sW=56,totalW=lW+cW+sW+16,totalH=D.owners.length*(bH+gap)+44;
  const gridLines=[0.25,0.5,0.75,1].map(pct=>{
    const x=lW+pct*cW;
    return`<line x1="${x}" y1="0" x2="${x}" y2="${totalH-34}" stroke="url(#gridFade)" stroke-width="1" stroke-dasharray="2,5"/>
      <text x="${x}" y="${totalH-18}" text-anchor="middle" fill="var(--textMuted)" font-size="8" font-family="'JetBrains Mono',monospace" opacity=".7">${Math.round(maxS*pct)}</text>`;
  }).join("");

  const bars=D.owners.map((o,i)=>{
    const y=i*(bH+gap);
    const pW=maxS>0?(o.totalPts/maxS)*cW:0;
    const isB=o.name==="Bradford";
    return`<g>
      <text x="10" y="${y+bH/2+1}" dominant-baseline="middle" fill="${i<3?['var(--gold)','var(--silver)','var(--bronze)'][i]:'var(--textMuted)'}" font-size="${i<3?13:11}" font-weight="800" font-family="'Outfit',sans-serif">${i+1}</text>
      <text x="26" y="${y+bH/2+1}" dominant-baseline="middle" fill="${isB?'var(--accent)':'var(--text)'}" font-size="12" font-weight="${isB?700:500}" font-family="'Outfit',sans-serif">${o.name}${isB?' ★':''}</text>
      <g transform="translate(${lW},0)">
        <rect x="0" y="${y+3}" width="${cW}" height="${bH-6}" rx="4" fill="var(--border)" opacity=".15"/>
        <rect x="0" y="${y+3}" width="${Math.max(pW,0)}" height="${bH-6}" rx="4" fill="#f97316" opacity=".9"/>
        ${isB?`<rect x="0" y="${y+2}" width="${pW}" height="${bH-4}" rx="5" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity=".5" filter="url(#barGlow)"/>`:''}
        ${pW>28?`<text x="${pW/2}" y="${y+bH/2+1}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.85)" font-size="9" font-weight="700" font-family="'JetBrains Mono',monospace">${o.totalPts}</text>`:''}
      </g>
      <text x="${lW+cW+10}" y="${y+bH/2+1}" dominant-baseline="middle" fill="${i===0?'var(--gold)':'var(--text)'}" font-size="14" font-weight="800" font-family="'Outfit',sans-serif">${o.totalScore}</text>
    </g>`;
  }).join("");

  const legend=[{l:"PTS",c:"#f97316"}].map((s,i)=>
    `<g transform="translate(${lW+i*64},${totalH-34})"><rect x="0" y="0" width="10" height="10" rx="2" fill="${s.c}" opacity=".9"/><text x="14" y="9" fill="var(--textSec)" font-size="9" font-weight="600" font-family="'JetBrains Mono',monospace">${s.l}</text></g>`
  ).join("");

  document.getElementById("chartSection").innerHTML=`
    <div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Fantasy Team Standings</h2></div>
    <p>Points Only · Sorted by total points scored</p></div>
    <div class="panel"><div class="panel-glow"></div><div class="panel-body" style="overflow-x:auto">
      <svg width="100%" viewBox="0 0 ${totalW} ${totalH}" style="max-width:${totalW}px;display:block">
        <defs><linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--border)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--border)" stop-opacity=".05"/></linearGradient>
        <filter id="barGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        ${gridLines}${bars}${legend}
      </svg>
    </div></div>`;

  // ─── ACTIVE PLAYERS REMAINING ──────────────────────────────────────────────
  const activeSort=[...D.owners].sort((a,b)=>b.active-a.active);
  document.getElementById("activePlayersSection").innerHTML=`
    <div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Active Players Remaining</h2></div>
    <p>Players whose teams are still alive in the tournament</p></div>
    <div class="panel"><div class="panel-body" style="padding:16px 20px">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
        ${activeSort.map(o=>{
          const pct=o.active/10*100;
          const clr=o.active>=7?'var(--green)':o.active>=4?'var(--gold)':'var(--red)';
          const isB=o.name==='Bradford';
          return`<div style="background:var(--cardAlt);border:1px solid ${isB?'var(--accent)':'var(--border)'};border-radius:10px;padding:12px 14px;position:relative;overflow:hidden">
            <div style="position:absolute;bottom:0;left:0;width:${pct}%;height:3px;background:${clr};border-radius:0 3px 0 0;opacity:.6"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span class="outfit fw6 fs12" style="color:${isB?'var(--accent)':'var(--text)'}">${o.name}</span>
              <span class="outfit fw8 fs18" style="color:${clr}">${o.active}</span>
            </div>
            <div style="display:flex;gap:3px">${o.players.map(p=>`<div style="width:8px;height:8px;border-radius:2px;background:${p.eliminated?'var(--border)':clr};opacity:${p.eliminated?.3:.9}"></div>`).join("")}</div>
            <div style="font-size:10px;color:var(--textMuted);margin-top:5px">${o.active} alive · ${10-o.active} eliminated</div>
          </div>`;
        }).join("")}
      </div>
    </div></div>`;

  // ─── LEADERBOARD ─────────────────────────────────────────────────────────────
  const lbRows=D.owners.map((o,i)=>{
    const cls=[`trow`,i%2?'trow-alt':'',medalCls(i),expandedOwner===o.name?'trow-expanded':''].filter(Boolean).join(' ');
    let roster='';
    if(expandedOwner===o.name){
      roster=`<div class="roster">
        <div class="roster-hdr"><span>Rd</span><span>Player</span><span>School</span><span class="r color-pts">PTS</span></div>
        ${o.players.map((p,pi)=>`<div class="roster-row${p.eliminated?' elim':''}" style="animation-delay:${pi*0.03}s">
          <span class="color-muted">${p.r}</span>
          <span class="fw5" style="color:${p.eliminated?'var(--elimText)':'var(--text)'};${p.eliminated?'text-decoration:line-through':''}"> ${p.n}${p.eliminated?' <span class="color-red" style="font-size:9px;font-weight:700;text-decoration:none;display:inline-block">ELIM</span>':''}</span>
          <span class="color-sec fs11">${p.s}</span>
          <span class="r fw7" style="color:${p.pts>0?'var(--gold)':'var(--textMuted)'}">${p.pts}</span>
        </div>`).join("")}
      </div>`;
    }
    return`<div>
      <div class="${cls}" style="grid-template-columns:48px 1fr 60px 100px" onclick="toggleOwner('${o.name}')">
        <span class="fs16 fw7">${medalE(i)}</span>
        <span class="outfit fw6 fs14" style="color:${o.name==='Bradford'?'var(--accent)':'var(--text)'}">${o.name}${o.name==='Bradford'?'<span class="color-gold fs11"> ★</span>':''}</span>
        <span class="c fw7 fs13" style="color:${o.active>=7?'var(--green)':o.active>=4?'var(--gold)':'var(--red)'}">${o.active}<span style="font-weight:400;color:var(--textMuted);font-size:10px">/10</span></span>
        <span class="r outfit fw7 fs18" style="color:${i===0?'var(--gold)':'var(--text)'}">${o.totalScore}</span>
      </div>${roster}
    </div>`;
  }).join("");

  document.getElementById("leaderboardSection").innerHTML=`
    <div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Owner Leaderboard</h2></div><p>Click any row to expand roster</p></div>
    <div class="panel">
      <div class="thdr" style="grid-template-columns:48px 1fr 60px 100px"><span>#</span><span>Owner</span><span class="c" style="color:var(--green)">ALIVE</span><span class="r">PTS</span></div>
      ${lbRows}
    </div>`;

  // ─── TOP PLAYERS ─────────────────────────────────────────────────────────────
  const sorted=[...D.top].sort((a,b)=>sortDir==="desc"?(b[sortCol]||0)-(a[sortCol]||0):(a[sortCol]||0)-(b[sortCol]||0));
  const sortIcon=col=>sortCol===col?(sortDir==="desc"?" ↓":" ↑"):"";
  const sortCls=col=>sortCol===col?"sort-head sort-active r":"sort-head r";

  document.getElementById("topPlayersSection").innerHTML=`
    <div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Top Players</h2></div><p>League-wide rankings · Click headers to sort</p></div>
    <div class="panel">
      <div class="thdr tp-grid"><span>#</span><span>Player</span><span class="hide-mobile">School</span><span>Owner</span>
        <span class="${sortCls('pts')}" onclick="setSort('pts')">PTS${sortIcon('pts')}</span>
      </div>
      ${sorted.map((p,i)=>`<div class="trow tp-grid${i%2?' trow-alt':''}" style="cursor:default;opacity:${p.eliminated?.3:1};animation:fadeIn .3s ease ${i*0.02}s both">
        <span class="fw7" style="color:${i<3?'var(--gold)':'var(--textMuted)'}">${i+1}</span>
        <span class="fw6" style="${p.eliminated?'text-decoration:line-through':''}">${p.name}</span>
        <span class="color-sec fs11 hide-mobile">${p.school}</span>
        <span class="fs11" style="color:${p.owner==='Bradford'?'var(--accent)':'var(--textSec)'};font-weight:${p.owner==='Bradford'?600:400}">${p.owner}</span>
        <span class="r fw7 color-gold">${p.pts}</span>
      </div>`).join("")}
    </div>`;

  // ─── DRAFT VALUE ─────────────────────────────────────────────────────────────
  const maxAvg=Math.max(...D.dv.map(x=>parseFloat(x.avg)),1);
  document.getElementById("draftValueSection").innerHTML=`
    <div class="sh"><div class="sh-row"><div class="sh-bar"></div><h2>Draft Round Value</h2></div><p>Average score per round · Rounds 9–10: 8-seed+ only</p></div>
    <div class="panel">
      <div class="thdr dv-grid"><span>Round</span><span class="r">Avg</span><span class="r">Total</span><span style="padding-left:20px">Best Pick</span><span class="r">Best</span></div>
      ${D.dv.map((d,i)=>{
        const bW=(parseFloat(d.avg)/maxAvg)*100;
        return`<div class="trow dv-grid${i%2?' trow-alt':''}" style="cursor:default;animation:fadeIn .3s ease ${i*0.04}s both">
          <span class="fw7" style="color:${d.round<=3?'var(--accent)':'var(--textSec)'}">Rd ${d.round}${d.round>=9?'<span class="color-gold" style="font-size:9px"> ★</span>':''}</span>
          <span class="r fw6">${d.avg}</span><span class="r color-sec">${d.total}</span>
          <span style="padding-left:20px;display:flex;align-items:center;gap:8px" class="color-sec">
            <span style="display:inline-block;height:5px;border-radius:3px;flex-shrink:0;background:linear-gradient(90deg,var(--accent),var(--green));width:${bW}%;max-width:120px;opacity:.6"></span>
            <span class="nowrap">${d.best}</span>
          </span>
          <span class="r fw6 color-green" style="color:var(--green)">${d.bestScore}</span>
        </div>`;
      }).join("")}
    </div>`;
}

function toggleOwner(name){expandedOwner=expandedOwner===name?null:name;render();}
function setSort(col){if(sortCol===col)sortDir=sortDir==="desc"?"asc":"desc";else{sortCol=col;sortDir="desc";}render();}

// ─── INIT ──────────────────────────────────────────────────────────────────────
fetchAllData();
setInterval(fetchAllData,120000);
</script>
